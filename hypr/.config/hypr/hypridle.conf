general {
    lock_cmd = pidof hyprlock || hyprlock   # avoids launching multiple instances
    before_sleep_cmd = loginctl lock-session # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on # turn monitor back on after wake
}

# Lock the screen after 15 minutes of inactivity
listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

# Turn off the monitor after 10 minutes
listener {
    timeout = 1200
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 60 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}

